name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:           # Only trigger when these files change
      - 'app/**'
      - '.github/workflows/docker-publish.yml'
  release:
    types: [published]  # Also trigger when you publish a GitHub release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/falk0069/plex-alexa-skill-bridge:latest
            ghcr.io/falk0069/plex-alexa-skill-bridge:${{ github.sha }}
