# ─── plex.YOUR_DOMAIN ────────────────────────────────────────────────────────
# Consolidated vhost: Alexa skill endpoint + Plex audio streaming + thumbnails
# ─────────────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName plex.YOUR_DOMAIN
    ErrorLog logs/ssl_plex_error_log
    TransferLog logs/ssl_plex_access_log
    LogLevel warn
    CustomLog logs/ssl_plex_request_log "%t %h %{SSL_PROTOCOL}x %{SSL_CIPHER}x \"%r\" %b"

    SSLEngine on
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH
    SSLCompression off
    SSLCertificateFile      /etc/letsencrypt/live/YOUR_DOMAIN/cert.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"

    ProxyRequests Off
    ProxyTimeout 300
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    # ── Block anything that isn't an allowed path ─────────────────────────────
    <LocationMatch "^(?!/skill$|/status$|/library/parts/|/library/metadata/)">
        Require all denied
    </LocationMatch>

    # ── /skill → Flask container (port 5001) ─────────────────────────────────
    # POST only — Alexa only sends POSTs
    <Location /skill>
        Require all granted
        <LimitExcept POST>
            Require all denied
        </LimitExcept>
    </Location>
    ProxyPass        /skill http://127.0.0.1:5001/skill
    ProxyPassReverse /skill http://127.0.0.1:5001/skill

    # ── /status → Flask container (port 5001) ────────────────────────────────
    # Optional: remove once setup is confirmed working
    <Location /status>
        Require all granted
    </Location>
    ProxyPass        /status http://127.0.0.1:5001/status
    ProxyPassReverse /status http://127.0.0.1:5001/status

    # ── /library/parts/ → Plex audio streaming (port 32400) ──────────────────
    # GET/HEAD only — Alexa fetches audio streams here
    <Location /library/parts>
        Require all granted
        <LimitExcept GET HEAD>
            Require all denied
        </LimitExcept>
    </Location>
    ProxyPreserveHost Off
    ProxyPass        /library/parts/ http://YOUR_PLEX_IP:32400/library/parts/ nocanon
    ProxyPassReverse /library/parts/ http://YOUR_PLEX_IP:32400/library/parts/
    SetEnv proxy-sendchunked 1

    # ── /library/metadata/ → Plex thumbnail images (port 32400) ─────────────
    # GET/HEAD only — Echo Show fetches album art here
    <Location /library/metadata>
        Require all granted
        <LimitExcept GET HEAD>
            Require all denied
        </LimitExcept>
    </Location>
    ProxyPass        /library/metadata/ http://YOUR_PLEX_IP:32400/library/metadata/ nocanon
    ProxyPassReverse /library/metadata/ http://YOUR_PLEX_IP:32400/library/metadata/

</VirtualHost>
