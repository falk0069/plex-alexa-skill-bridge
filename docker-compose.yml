services:
  plex-alexa-skill:
    image: ghcr.io/falk0069/plex-alexa-skill-bridge:latest
    # build: ./app #if not using the image above and self compiling
    container_name: plex-alexa-skill
    environment:
      # Your public HTTPS hostname for the Alexa skill endpoint (Alexa requires https 443))
      - SKILL_HOSTNAME=plex.YOUR_DOMAIN

      # Plex server internal LAN address
      - PLEX_URL=http://YOUR_PLEX_IP:32400

      # Plex token (read from Docker secret file)
      - PLEX_TOKEN=/run/secrets/PLEX_TOKEN

      # Public hostname Alexa uses to stream audio (FQDN only Alexa requires https 443)
      - PLEX_PUBLIC_HOSTNAME=plex.YOUR_DOMAIN

      - PORT=5001
      - TZ=America/Chicago

      # Uncomment to enable the /status diagnostic page (disable when not needed)
      # - ENABLE_STATUS_PAGE=true

      # Uncomment during initial testing to skip Alexa request signature verification
      # - DISABLE_REQUEST_VERIFY=true

    secrets:
      - PLEX_TOKEN

    ports:
      - "5001:5001"

    restart: unless-stopped

secrets:
  PLEX_TOKEN:
    file: ./secrets/plex_token.txt
