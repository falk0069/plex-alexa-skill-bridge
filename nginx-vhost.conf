# ─── plex.YOUR_DOMAIN ────────────────────────────────────────────────────────
# Consolidated server block: Alexa skill endpoint + Plex audio streaming + thumbnails
# Replace YOUR_DOMAIN and YOUR_PLEX_IP before use.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name plex.YOUR_DOMAIN;

    access_log /var/log/nginx/plex_access.log;
    error_log  /var/log/nginx/plex_error.log warn;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Default: deny all unmatched paths ────────────────────────────────────
    location / {
        return 403;
    }

    # ── /skill → Flask container (port 5001) ─────────────────────────────────
    # POST only — Alexa only sends POSTs
    location = /skill {
        limit_except POST { deny all; }

        proxy_pass         http://127.0.0.1:5001/skill;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_read_timeout 30;
    }

    # ── /status → Flask container (port 5001) ────────────────────────────────
    # Optional: remove once setup is confirmed working
    location = /status {
        proxy_pass       http://127.0.0.1:5001/status;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $remote_addr;
    }

    # ── /library/parts/ → Plex audio streaming (port 32400) ──────────────────
    # GET/HEAD only — Alexa fetches audio streams here
    # proxy_buffering off allows the stream to flow through without nginx
    # buffering the entire file first.
    location ^~ /library/parts/ {
        limit_except GET HEAD { deny all; }

        proxy_pass         http://YOUR_PLEX_IP:32400/library/parts/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 300;
    }

    # ── /library/metadata/ → Plex thumbnail images (port 32400) ─────────────
    # GET/HEAD only — Echo Show fetches album art here
    location ^~ /library/metadata/ {
        limit_except GET HEAD { deny all; }

        proxy_pass       http://YOUR_PLEX_IP:32400/library/metadata/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $remote_addr;
    }
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name plex.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}
